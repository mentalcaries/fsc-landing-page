<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="oklch(0.22 0.04 240)" />
      <stop offset="100%" stop-color="oklch(0.13 0.03 240)" />
    </linearGradient>
    <linearGradient id="grad" x1="13" y1="10" x2="51" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.12" />
      <stop offset="100%" stop-color="black" stop-opacity="0.08" />
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)" />

  <!-- Clipboard body — same as original logo -->
  <rect x="13" y="10" width="38" height="46" rx="5" fill="oklch(0.696 0.17 162.48)" />
  <rect x="13" y="10" width="38" height="46" rx="5" fill="url(#grad)" />

  <!-- Clipboard clip -->
  <rect x="24" y="6" width="16" height="9" rx="3" fill="oklch(0.55 0.15 162.48)" />

  <!-- Rule lines -->
  <line x1="22" y1="28" x2="42" y2="28" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5" />
  <line x1="22" y1="36" x2="42" y2="36" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5" />
  <line x1="22" y1="44" x2="34" y2="44" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5" />

  <!-- Checkmark -->
  <polyline points="20,22 26,28 36,17" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
</svg>
